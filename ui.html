<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: Inter, sans-serif; font-size: 11px; margin: 8px; }
  button { padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; background: #eee; color: #333; }
  #status { color: #999; margin-left: 8px; }
</style>
</head>
<body>

<button id="snap-btn">Snap Viewport</button>
<span id="status">—</span>

<!-- ui for debugging -->
<!-- <input id="query" type="text" placeholder="command..." />
<button id="btn">Select</button> -->

<script>

const VIEWPORT = { x: 0, y: 0, zoom: 1 };

let ws;
function connect() {
  ws = new WebSocket("ws://localhost:8000/ws"); //opens websocket connection
  ws.onopen = () => { document.getElementById("status").textContent = "connected"; };
  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    if (data.command) parent.postMessage({ pluginMessage: data.command }, "*");
  };
  ws.onclose = () => {
    document.getElementById("status").textContent = "reconnecting...";
    setTimeout(connect, 2000);
  };
}
connect();

document.getElementById("snap-btn").onclick = () => {
  parent.postMessage({ pluginMessage: { type: "set_viewport", ...VIEWPORT } }, "*");
};

window.onmessage = (event) => {
  const msg = event.data.pluginMessage;
  if (!msg || !ws.readyState === WebSocket.OPEN) return;
  ws.send(JSON.stringify(msg));
};
</script>
</body>
</html>
